<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>FB Affiliate System Extractor</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 15px; width: 350px; background: #171717; color: #ededed; }
    h3 { margin-top: 0; color: #ff8515; }
    label { font-size: 12px; color: #a3a3a3; display: block; margin-bottom: 5px; margin-top: 10px; }
    input, select { width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 5px; background: #262626; border: 1px solid #404040; color: white; border-radius: 4px; }
    button { width: 100%; padding: 10px; margin-top: 15px; background: #ff8515; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #f06a06; }
    button:disabled { background: #555; cursor: not-allowed; }
    #status { margin-top: 10px; font-size: 12px; color: #a3a3a3; text-align: center; word-break: break-word; }
  </style>
</head>
<body>
  <h3>FB Affiliate Extractor</h3>

  <label for="pageSelect">เลือกเพจ (ดึงข้อมูลอัตโนมัติ):</label>
  <select id="pageSelect">
    <option value="">กำลังโหลดเพจ...</option>
  </select>

  <div style="display: flex; gap: 10px;">
    <div style="flex: 1;">
      <label for="startDate">ตั้งแต่วันที่:</label>
      <input type="date" id="startDate" />
    </div>
    <div style="flex: 1;">
      <label for="endDate">ถึงวันที่:</label>
      <input type="date" id="endDate" />
    </div>
  </div>

  <label for="affiliateLink">Shopee Affiliate Link:</label>
  <input type="text" id="affiliateLink" placeholder="https://s.shopee.co.th/..." />
  
  <button id="extractBtn" disabled>ค้นหาและเพิ่มเข้าคิวงาน</button>
  <div id="status">รอโหลดข้อมูล...</div>

  <script src="popup.js"></script>
</body>
</html>
