name: Build and Release Electron App

on:
  push:
    branches:
      - main
  workflow_dispatch: # อนุญาตให้กดสั่ง Build แบบ Manual ผ่านหน้าเว็บ GitHub ได้

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: webapp
        run: npm install

      - name: Build Next.js App
        working-directory: webapp
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Create env.txt for Bot
        working-directory: webapp
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > env.txt
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> env.txt

      - name: Build and Publish
        working-directory: webapp
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- -p always
        
      - name: Upload EXE as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FB-Affiliate-System-Installer
          path: webapp/dist/*.exe
